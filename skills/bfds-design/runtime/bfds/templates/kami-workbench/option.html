<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{OPTION_NAME}}</title>
    <style>
      :root {
        --bg: {{TARGET_BG}};
        --surface: {{TARGET_SURFACE}};
        --ink: {{TARGET_INK}};
        --muted: {{TARGET_MUTED}};
        --accent: {{TARGET_ACCENT}};
        --border: {{TARGET_BORDER}};
        --font: {{TARGET_FONT}};
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .surface {
        min-height: 100vh;
        padding: clamp(18px, 4vw, 44px);
      }

      .shell {
        max-width: 1040px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .topbar,
      .workspace,
      .status-tray {
        background: var(--surface);
        border: 1px solid var(--border);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
      }

      .brand {
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink);
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      button:focus-visible,
      textarea:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
        outline-offset: 2px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
        min-height: 460px;
      }

      .editor {
        padding: clamp(18px, 3vw, 34px);
        display: grid;
        gap: 14px;
        align-content: start;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(26px, 4vw, 44px);
        line-height: 1.08;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .helper {
        max-width: 68ch;
        color: var(--muted);
        margin: 0;
      }

      textarea {
        width: 100%;
        min-height: 168px;
        resize: vertical;
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 88%, var(--bg));
        color: var(--ink);
        padding: 14px;
        font: inherit;
      }

      .side {
        border-left: 1px solid var(--border);
        padding: clamp(18px, 3vw, 28px);
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .state {
        display: grid;
        gap: 8px;
      }

      .state strong {
        font-size: 13px;
      }

      .state p {
        margin: 0;
        color: var(--muted);
      }

      .status-tray {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
      }

      .status-text {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .side {
          border-left: 0;
          border-top: 1px solid var(--border);
        }

        .topbar,
        .status-tray {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="surface">
      <div class="shell">
        <header class="topbar">
          <div class="brand">{{PRODUCT_NAME}}</div>
          <div class="actions">
            <button type="button" data-state="default">Default</button>
            <button type="button" data-state="error">Error</button>
            <button type="button" data-state="success">Success</button>
          </div>
        </header>

        <section class="workspace" aria-label="{{OPTION_NAME}}">
          <div class="editor">
            <h1>{{SURFACE_HEADING}}</h1>
            <p class="helper">{{SURFACE_HELPER}}</p>
            <textarea aria-label="{{INPUT_LABEL}}">{{INPUT_VALUE}}</textarea>
            <div class="actions">
              <button class="primary" type="button">{{PRIMARY_ACTION}}</button>
              <button type="button">{{SECONDARY_ACTION}}</button>
            </div>
          </div>
          <aside class="side">
            <div class="state">
              <strong>{{STATE_TITLE}}</strong>
              <p id="state-copy">{{STATE_COPY}}</p>
            </div>
            <div class="state">
              <strong>{{DETAIL_TITLE}}</strong>
              <p>{{DETAIL_COPY}}</p>
            </div>
          </aside>
        </section>

        <footer class="status-tray">
          <span class="status-text" id="status-text">{{STATUS_TEXT}}</span>
          <button type="button" id="toggle-density">{{DENSITY_ACTION}}</button>
        </footer>
      </div>
    </main>
    <script>
      const statusText = document.querySelector("#status-text");
      const stateCopy = document.querySelector("#state-copy");
      document.querySelectorAll("[data-state]").forEach((button) => {
        button.addEventListener("click", () => {
          const state = button.dataset.state;
          statusText.textContent = state === "default" ? "{{STATUS_DEFAULT}}" : state === "error" ? "{{STATUS_ERROR}}" : "{{STATUS_SUCCESS}}";
          stateCopy.textContent = statusText.textContent;
        });
      });
      document.querySelector("#toggle-density").addEventListener("click", () => {
        document.body.classList.toggle("compact");
      });
    </script>
  </body>
</html>
