<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>方案 A · Quiet Precision</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --surface: #ffffff;
        --ink: #18202f;
        --muted: #667085;
        --accent: #2457d6;
        --border: #d9dee8;
        --success: #21725a;
        --error: #b42318;
        --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: 0;
      }

      .surface { min-height: 100vh; padding: clamp(18px, 4vw, 44px); }
      .shell { max-width: 1040px; margin: 0 auto; display: grid; gap: 18px; }
      .topbar, .workspace, .status-tray { background: var(--surface); border: 1px solid var(--border); }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 18px; }
      .brand { font-weight: 700; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      button {
        min-height: 36px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink);
        padding: 0 12px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button.primary { border-color: var(--accent); background: var(--accent); color: white; }
      button:focus-visible, textarea:focus-visible { outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent); outline-offset: 2px; }
      .workspace { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr); min-height: 460px; }
      .editor { padding: clamp(18px, 3vw, 34px); display: grid; gap: 14px; align-content: start; }
      h1 { margin: 0; max-width: 760px; font-size: clamp(26px, 4vw, 42px); line-height: 1.08; letter-spacing: 0; text-wrap: balance; }
      .helper { max-width: 68ch; color: var(--muted); margin: 0; }
      textarea {
        width: 100%;
        min-height: 172px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fbfcfe;
        color: var(--ink);
        padding: 14px;
        font: inherit;
      }
      .side { border-left: 1px solid var(--border); padding: clamp(18px, 3vw, 28px); display: grid; align-content: start; gap: 16px; }
      .state { display: grid; gap: 8px; }
      .state strong { font-size: 13px; }
      .state p { margin: 0; color: var(--muted); }
      .status-tray { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 16px; }
      .status-text { color: var(--muted); }
      body[data-state="error"] .status-text, body[data-state="error"] .state p:first-of-type { color: var(--error); }
      body[data-state="success"] .status-text, body[data-state="success"] .state p:first-of-type { color: var(--success); }

      @media (max-width: 720px) {
        .workspace { grid-template-columns: 1fr; }
        .side { border-left: 0; border-top: 1px solid var(--border); }
        .topbar, .status-tray { align-items: stretch; flex-direction: column; }
      }
    </style>
  </head>
  <body data-state="default">
    <main class="surface">
      <div class="shell">
        <header class="topbar">
          <div class="brand">Team Settings</div>
          <div class="actions">
            <button type="button" data-state="default">Default</button>
            <button type="button" data-state="error">Error</button>
            <button type="button" data-state="success">Success</button>
          </div>
        </header>
        <section class="workspace" aria-label="Quiet Precision prompt editor">
          <div class="editor">
            <h1>团队默认提示词</h1>
            <p class="helper">用于新项目的默认提示。占位示例仅展示结构，实际内容应来自用户配置。</p>
            <textarea aria-label="团队默认提示词">[占位] 请在这里放入团队确认过的默认提示词。</textarea>
            <div class="actions">
              <button class="primary" type="button">Save prompt</button>
              <button type="button">Preview response</button>
            </div>
          </div>
          <aside class="side">
            <div class="state">
              <strong>当前状态</strong>
              <p id="state-copy">Ready to edit. Unsaved changes will be shown beside the action.</p>
            </div>
            <div class="state">
              <strong>设计说明</strong>
              <p>帮助内容贴近输入，但降低视觉权重，避免抢走编辑注意力。</p>
            </div>
          </aside>
        </section>
        <footer class="status-tray">
          <span class="status-text" id="status-text">Ready to edit.</span>
          <button type="button" id="toggle-density">Toggle density</button>
        </footer>
      </div>
    </main>
    <script>
      const messages = {
        default: "Ready to edit.",
        error: "Prompt is too short to be saved.",
        success: "Prompt saved. New projects will use this default."
      };
      const statusText = document.querySelector("#status-text");
      const stateCopy = document.querySelector("#state-copy");
      document.querySelectorAll("[data-state]").forEach((button) => {
        button.addEventListener("click", () => {
          const state = button.dataset.state;
          document.body.dataset.state = state;
          statusText.textContent = messages[state];
          stateCopy.textContent = messages[state];
        });
      });
      document.querySelector("#toggle-density").addEventListener("click", () => {
        document.querySelector(".editor").style.gap = document.querySelector(".editor").style.gap === "8px" ? "14px" : "8px";
      });
    </script>
  </body>
</html>
